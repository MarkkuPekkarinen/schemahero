apiVersion: v1
kind: ServiceAccount
metadata:
  name: schemahero-slack-app
  namespace: schemahero-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: schemahero-slack-app
rules:
  - apiGroups:
      - schemas.schemahero.io
    resources:
      - migrations
    verbs:
      - get
      - list
      - watch
      - update
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: schemahero-slack-app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: schemahero-slack-app
subjects:
  - kind: ServiceAccount
    name: schemahero-slack-app
    namespace: schemahero-system
